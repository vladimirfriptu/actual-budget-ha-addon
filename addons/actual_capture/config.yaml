name: actual_capture
slug: actual_capture
version: "0.1.0"
description: >-
  Telegram + OpenRouter capture service for Actual Budget. Send an expense as
  text or a receipt photo; it files a draft transaction into Actual for evening
  review.
arch:
  - amd64
init: false
# No ports: the bot uses Telegram long-polling (no inbound connections).
options:
  bot_token: ""
  owner_chat_id: 0
  openrouter_api_key: ""
  openrouter_text_model: "openai/gpt-4o-mini"
  openrouter_vision_model: "openai/gpt-4o-mini"
  groq_api_key: ""
  groq_model: "whisper-large-v3-turbo"
  actual_url: "https://192.168.68.140:5006"
  actual_password: ""
  actual_budget_sync_id: ""
  actual_e2e_password: ""
  default_cash_account: "Наличные"
schema:
  bot_token: str
  owner_chat_id: int
  openrouter_api_key: str
  openrouter_text_model: str
  openrouter_vision_model: str
  groq_api_key: str
  groq_model: str
  actual_url: str
  actual_password: str
  actual_budget_sync_id: str
  actual_e2e_password: str?
  default_cash_account: str
